services:
  api:
    build: .
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"

  dashboard:
    build: .
    command: python -m streamlit run dashboard/dashboard.py --server.address 0.0.0.0 --server.port 8501
    environment:
      - API_URL=http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api
